<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时钟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    .time {
      font-size: 80px;
      font-weight: 200;
      letter-spacing: 4px;
      color: #e0e0ff;
      text-shadow: 0 0 20px rgba(120, 120, 255, 0.5);
    }

    .seconds {
      font-size: 48px;
      color: #8080cc;
    }

    .date {
      margin-top: 16px;
      font-size: 20px;
      color: #8888aa;
      letter-spacing: 2px;
    }

    .weekday {
      margin-top: 6px;
      font-size: 14px;
      color: #6666aa;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="time">
      <span id="hh"></span>:<span id="mm"></span>:<span class="seconds" id="ss"></span>
    </div>
    <div class="date" id="date"></div>
    <div class="weekday" id="weekday"></div>
  </div>

  <script>
    const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function update() {
      const now = new Date();
      document.getElementById('hh').textContent = pad(now.getHours());
      document.getElementById('mm').textContent = pad(now.getMinutes());
      document.getElementById('ss').textContent = pad(now.getSeconds());
      document.getElementById('date').textContent =
        `${now.getFullYear()} 年 ${now.getMonth() + 1} 月 ${now.getDate()} 日`;
      document.getElementById('weekday').textContent = weekdays[now.getDay()];
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
